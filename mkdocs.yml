site_name: Harshil Shah — Engineering Playbook
site_description: Personal engineering principles, patterns and best practices by Harshil Shah
site_author: Harshil Shah
site_url: https://harshil-sh.github.io/engineering-playbook
repo_url: https://github.com/harshil-sh/engineering-playbook
repo_name: harshil-sh/engineering-playbook

nav:
  - Home: index.md
  - Engineering Principles: engineering-principles.md
  - SOLID Principles: solid-principles.md
  - System Design: system-design-patterns.md
  - Code Review: code-review-guidelines.md
  - Testing Strategy: testing-strategy.md
  - Python Best Practices: python-best-practices.md
  - ADRs: architecture-decision-records.md
  - Playbook:
      - Decision Frameworks:
          - Tech Stack Rubric: playbook/decision-frameworks/tech-stack-rubric.md
          - ADR Template: playbook/decision-frameworks/adr-template.md
          - Case Study — Monolith to Microservices: playbook/decision-frameworks/case-study-monolith-to-microservices.md
      - AI Workflow:
          - Philosophy: playbook/ai-workflow/philosophy.md
          - Prompt Engineering Guide: playbook/ai-workflow/prompt-engineering-guide.md
          - Governance: playbook/ai-workflow/governance.md
      - Operational Excellence:
          - Incident Response: playbook/operational-excellence/incident-response.md
          - Post-Mortem Template: playbook/operational-excellence/post-mortem-template.md
      - Developer Velocity:
          - Local Dev Setup: playbook/developer-velocity/local-dev-setup.md
          - DORA Metrics: playbook/developer-velocity/dora-metrics.md
      - People:
          - Product-Engineering Bridge: playbook/people/product-engineering-bridge.md
          - Working with Me: playbook/people/working-with-me.md
          - Mentorship and Code Review: playbook/people/mentorship-and-code-review.md
      - Quality:
          - Definition of Done: playbook/quality/definition-of-done.md
          - Testing Philosophy: playbook/quality/testing-philosophy.md
  - About: about.md

theme:
  name: material
  language: en
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/harshilmayurshah/
      name: LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/harshil-sh
      name: GitHub
